name: iOS Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: |
          rm -rf public/*
          mkdir -p public/icons
          cp webapp.html public/index.html
          cp manifest.json public/ || true
          cp sw.js public/ || true
          cp offline.html public/ || true
          cp icons/*.png public/icons/ 2>/dev/null || true

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install Apple Certificate and Provisioning Profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # Create certificates directory
          mkdir -p ~/certificates
          
          # Decode and install certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > ~/certificates/distribution.p12
          
          # Create temporary keychain
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Import certificate
          security import ~/certificates/distribution.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/foxpot.mobileprovision

      - name: Build and Archive
        run: |
          cd ios/App
          xcodebuild clean archive \
            -scheme App \
            -archivePath App.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="FoxPot App Store"

      - name: Export IPA
        run: |
          cd ios/App
          
          # Create export options plist
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>club.thefoxpot.app</key>
                  <string>FoxPot App Store</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          # Export archive to IPA
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to App Store Connect
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Save API key
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY" | base64 --decode > ~/private_keys/AuthKey_$APPLE_KEY_ID.p8
          
          # Upload to App Store Connect
          xcrun altool --upload-app \
            --type ios \
            --file ios/App/App.ipa \
            --apiKey $APPLE_KEY_ID \
            --apiIssuer $APPLE_ISSUER_ID

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: foxpot-ios-app
          path: ios/App/App.ipa
          retention-days: 7
