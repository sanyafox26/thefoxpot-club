name: Generate CSR for Apple Certificate

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - name: Generate private key and CSR
        run: |
          openssl genrsa -out distribution.key 2048

          printf '[req]\ndefault_bits=2048\nprompt=no\ndefault_md=sha256\ndistinguished_name=dn\n[dn]\nC=PL\nCN=The FoxPot Club\nemailAddress=kontakt@thefoxpot.club\n' > csr.conf

          openssl req -new \
            -key distribution.key \
            -out distribution.csr \
            -config csr.conf

          echo "=== CSR CONTENT (upload this to Apple Developer Portal) ==="
          cat distribution.csr

          echo ""
          echo "=== PRIVATE KEY BASE64 (save this for the create-p12 workflow) ==="
          cat distribution.key | base64 | tr -d '\n'

      - name: Upload CSR and key as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-csr-and-key
          path: |
            distribution.csr
            distribution.key
          retention-days: 1
