name: Generate CSR for Apple Certificate

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - name: Generate private key and CSR
        run: |
          openssl genrsa -out distribution.key 2048

          python3 -c "
          config = '''[req]
default_bits=2048
prompt=no
default_md=sha256
distinguished_name=dn
[dn]
C=PL
CN=The FoxPot Club
emailAddress=kontakt@thefoxpot.club
'''
          open('csr.conf', 'w').write(config)
          "

          openssl req -new \
            -key distribution.key \
            -out distribution.csr \
            -config csr.conf

          echo "=== CSR CONTENT ==="
          cat distribution.csr

      - name: Upload CSR and key as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-csr-and-key
          path: |
            distribution.csr
            distribution.key
          retention-days: 1
