name: Generate CSR for Apple Certificate

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - name: Generate private key and CSR
        run: |
          # Generate RSA private key
          openssl genrsa -out distribution.key 2048

          # Write OpenSSL config to avoid -subj parsing issues
          cat > csr.conf << 'EOF'
          [req]
          default_bits       = 2048
          prompt             = no
          default_md         = sha256
          distinguished_name = dn
          [dn]
          C  = PL
          CN = The FoxPot Club
          emailAddress = kontakt@thefoxpot.club
          EOF

          # Generate CSR using config file
          openssl req -new \
            -key distribution.key \
            -out distribution.csr \
            -config csr.conf

          echo "=== CSR CONTENT (upload this to Apple Developer Portal) ==="
          cat distribution.csr

          echo ""
          echo "=== PRIVATE KEY BASE64 (save this for the create-p12 workflow) ==="
          base64 < distribution.key | tr -d '\n'

      - name: Upload CSR and key as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-csr-and-key
          path: |
            distribution.csr
            distribution.key
          retention-days: 1
