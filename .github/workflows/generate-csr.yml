name: Generate CSR for Apple Certificate

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - name: Generate private key
        run: openssl genrsa -out distribution.key 2048

      - name: Write OpenSSL config
        run: |
          echo "[req]" > csr.conf
          echo "default_bits=2048" >> csr.conf
          echo "prompt=no" >> csr.conf
          echo "default_md=sha256" >> csr.conf
          echo "distinguished_name=dn" >> csr.conf
          echo "[dn]" >> csr.conf
          echo "C=PL" >> csr.conf
          echo "CN=The FoxPot Club" >> csr.conf
          echo "emailAddress=kontakt@thefoxpot.club" >> csr.conf

      - name: Generate CSR
        run: |
          openssl req -new -key distribution.key -out distribution.csr -config csr.conf
          cat distribution.csr

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-csr-and-key
          path: |
            distribution.csr
            distribution.key
          retention-days: 1
