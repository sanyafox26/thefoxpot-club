name: Daily DB Backup
on:
  schedule:
    - cron: '0 3 * * *'  # щодня о 3:00 UTC
  workflow_dispatch:      # також вручну

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Backup PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          sudo apt-get update -y
          sudo apt-get remove -y postgresql-client* libpq* || true
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" > "backup_$(date +%Y%m%d_%H%M).sql"
          echo "Done: $(wc -c < backup_$(date +%Y%m%d_%H%M).sql) bytes"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: backup_*.sql
          retention-days: 30
