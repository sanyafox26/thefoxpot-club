name: Daily DB Backup
on:
  schedule:
    - cron: '0 3 * * *'  # щодня о 3:00 UTC
  workflow_dispatch:      # також вручну

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Backup PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          FILENAME="backup_$(date +%Y%m%d_%H%M).sql"
          pg_dump "$DATABASE_URL" > "$FILENAME"
          echo "Backup size: $(wc -c < $FILENAME) bytes"
          echo "Backup file: $FILENAME"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: backup_*.sql
          retention-days: 30
