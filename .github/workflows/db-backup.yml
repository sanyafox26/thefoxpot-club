name: Daily DB Backup
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 17
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Check pg_dump version
        run: |
          which pg_dump
          pg_dump --version
          ls /usr/lib/postgresql/
          ls /usr/bin/pg_dump || echo "no pg_dump in /usr/bin"

      - name: Backup database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FILENAME="backup_$(date +%Y%m%d_%H%M).sql"
          /usr/lib/postgresql/17/bin/pg_dump --no-password "$DATABASE_URL" > "$FILENAME" || \
          pg_dump --no-acl --no-owner "$DATABASE_URL" > "$FILENAME"
          echo "Backup size: $(wc -c < $FILENAME) bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: backup_*.sql
          retention-days: 30
