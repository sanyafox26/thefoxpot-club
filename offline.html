<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0b14"/>
<title>FoxPot — Brak połączenia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0b14;
    color: #fff;
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .fox { font-size: 72px; margin-bottom: 24px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  p { color: #9ca3af; font-size: 15px; line-height: 1.5; margin-bottom: 32px; }
  button {
    background: #F59E0B;
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
  <div class="fox">🦊</div>
  <h1>Brak połączenia</h1>
  <p>Sprawdź połączenie z internetem<br>i spróbuj ponownie.</p>
  <button onclick="window.location.reload()">Spróbuj ponownie</button>
</body>
</html>
